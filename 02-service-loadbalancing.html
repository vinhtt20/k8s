<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Animation 2 — Service load balancing</title>
<style>
  body {
    font-family: -apple-system, "Segoe UI", sans-serif;
    background: #0d1117;
    color: #e6edf3;
    margin: 0;
    padding: 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 { color: #58a6ff; margin-bottom: 5px; }
  p.sub { color: #8b949e; margin-bottom: 30px; }

  svg { background: #161b22; border-radius: 12px; }

  .label-svc { fill: #ffd33d; font-weight: bold; font-size: 14px; }
  .label { fill: #e6edf3; font-size: 13px; font-family: "SF Mono", monospace; }

  .controls { margin-top: 25px; display:flex; gap: 12px; align-items:center;}
  button {
    background: #1f6feb; color: white; border: none;
    padding: 10px 22px; border-radius: 8px; font-size: 15px; cursor: pointer;
  }
  button:hover { background: #388bfd; }

  .stats {
    margin-top: 20px; padding: 12px 20px;
    background: #21262d; border-radius: 8px;
    font-family: "SF Mono", monospace; font-size: 14px;
    display: flex; gap: 30px;
  }
  .stats span b { color: #3fb950; }

  .speed-label { color: #8b949e; font-size: 14px; }
</style>
</head>
<body>
  <h1>🎬 Animation 2: Service phân phối traffic (Load Balancing)</h1>
  <p class="sub">Service đứng giữa, chia request đến các Pod theo round-robin.</p>

  <svg width="900" height="520" viewBox="0 0 900 520">
    <!-- Client -->
    <rect x="380" y="20" width="140" height="60" rx="10" fill="#238636"/>
    <text x="450" y="50" text-anchor="middle" fill="white" font-size="16" font-weight="bold">👤 CLIENT</text>
    <text x="450" y="68" text-anchor="middle" fill="#dafbe1" font-size="11">my-service:80</text>

    <!-- Service box -->
    <rect x="320" y="180" width="260" height="90" rx="12" fill="#1f6feb" stroke="#58a6ff" stroke-width="2"/>
    <text x="450" y="210" text-anchor="middle" class="label-svc" font-size="18">⚙ SERVICE</text>
    <text x="450" y="232" text-anchor="middle" class="label">ClusterIP: 10.96.0.10</text>
    <text x="450" y="252" text-anchor="middle" class="label">selector: app=backend</text>

    <!-- Pods -->
    <g id="pod1">
      <rect x="80" y="380" width="180" height="100" rx="10" fill="#30363d" stroke="#3fb950" stroke-width="2"/>
      <text x="170" y="410" text-anchor="middle" fill="#3fb950" font-size="16" font-weight="bold">📦 Pod 1</text>
      <text x="170" y="432" text-anchor="middle" class="label">10.1.1.5:8080</text>
      <text x="170" y="455" text-anchor="middle" class="label" id="count1" fill="#8b949e">Requests: 0</text>
    </g>
    <g id="pod2">
      <rect x="360" y="380" width="180" height="100" rx="10" fill="#30363d" stroke="#3fb950" stroke-width="2"/>
      <text x="450" y="410" text-anchor="middle" fill="#3fb950" font-size="16" font-weight="bold">📦 Pod 2</text>
      <text x="450" y="432" text-anchor="middle" class="label">10.1.1.6:8080</text>
      <text x="450" y="455" text-anchor="middle" class="label" id="count2" fill="#8b949e">Requests: 0</text>
    </g>
    <g id="pod3">
      <rect x="640" y="380" width="180" height="100" rx="10" fill="#30363d" stroke="#3fb950" stroke-width="2"/>
      <text x="730" y="410" text-anchor="middle" fill="#3fb950" font-size="16" font-weight="bold">📦 Pod 3</text>
      <text x="730" y="432" text-anchor="middle" class="label">10.1.1.7:8080</text>
      <text x="730" y="455" text-anchor="middle" class="label" id="count3" fill="#8b949e">Requests: 0</text>
    </g>

    <!-- Arrows from Service to Pods -->
    <line x1="380" y1="270" x2="170" y2="380" stroke="#30363d" stroke-width="2" stroke-dasharray="6,4"/>
    <line x1="450" y1="270" x2="450" y2="380" stroke="#30363d" stroke-width="2" stroke-dasharray="6,4"/>
    <line x1="520" y1="270" x2="730" y2="380" stroke="#30363d" stroke-width="2" stroke-dasharray="6,4"/>

    <!-- Animated request packet -->
    <circle id="packet" cx="450" cy="80" r="10" fill="#ffd33d" opacity="0">
      <title>Request packet</title>
    </circle>
  </svg>

  <div class="controls">
    <button onclick="sendOne()">📨 Gửi 1 request</button>
    <button onclick="sendBurst()">⚡ Gửi 10 requests</button>
    <button onclick="reset()">🔄 Reset</button>
    <span class="speed-label">Tốc độ:</span>
    <select id="speed" style="padding:6px;border-radius:6px;background:#21262d;color:white;border:1px solid #30363d;">
      <option value="600">Chậm</option>
      <option value="350" selected>Vừa</option>
      <option value="150">Nhanh</option>
    </select>
  </div>

  <div class="stats">
    <span>Pod 1: <b id="s1">0</b></span>
    <span>Pod 2: <b id="s2">0</b></span>
    <span>Pod 3: <b id="s3">0</b></span>
    <span>Tổng: <b id="total">0</b></span>
  </div>

<script>
  const counts = [0,0,0];
  let rrIndex = 0;
  let busy = false;

  const podPositions = [
    { x: 170, y: 430 },
    { x: 450, y: 430 },
    { x: 730, y: 430 }
  ];

  function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

  async function sendOne() {
    if (busy) return;
    busy = true;
    const speed = parseInt(document.getElementById('speed').value);
    const packet = document.getElementById('packet');
    const target = rrIndex;
    rrIndex = (rrIndex + 1) % 3;

    // Phase 1: Client → Service
    packet.setAttribute('opacity','1');
    packet.setAttribute('cx','450');
    packet.setAttribute('cy','80');

    const steps = 30;
    // To Service center
    for (let i=1; i<=steps; i++) {
      const t = i/steps;
      packet.setAttribute('cx', 450);
      packet.setAttribute('cy', 80 + (225-80)*t);
      await sleep(speed/steps);
    }

    // Pulse on Service
    packet.setAttribute('r','14');
    await sleep(80);
    packet.setAttribute('r','10');

    // Phase 2: Service → chosen Pod
    const tx = podPositions[target].x;
    const ty = podPositions[target].y;
    for (let i=1; i<=steps; i++) {
      const t = i/steps;
      packet.setAttribute('cx', 450 + (tx-450)*t);
      packet.setAttribute('cy', 225 + (ty-225)*t);
      await sleep(speed/steps);
    }

    // Update counter
    counts[target]++;
    document.getElementById('count'+(target+1)).textContent = 'Requests: ' + counts[target];
    document.getElementById('s'+(target+1)).textContent = counts[target];
    document.getElementById('total').textContent = counts[0]+counts[1]+counts[2];

    // Flash pod
    const pod = document.getElementById('pod'+(target+1)).querySelector('rect');
    pod.setAttribute('fill','#1a4a2e');
    setTimeout(()=> pod.setAttribute('fill','#30363d'), 250);

    packet.setAttribute('opacity','0');
    busy = false;
  }

  async function sendBurst() {
    for (let i=0; i<10; i++) {
      while (busy) await sleep(20);
      sendOne();
      await sleep(80);
    }
  }

  function reset() {
    counts[0]=counts[1]=counts[2]=0;
    rrIndex = 0;
    for (let i=1; i<=3; i++){
      document.getElementById('count'+i).textContent='Requests: 0';
      document.getElementById('s'+i).textContent='0';
    }
    document.getElementById('total').textContent='0';
  }
</script>
</body>
</html>
